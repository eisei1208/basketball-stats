{% extends "base.html" %}

{% block content %}
<h1 class="h3 mb-4">新規試合の作成</h1>

<form method="POST" action="{{ url_for('new_game') }}">
    <div class="mb-3">
        <label for="date" class="form-label">日付</label>
        <input type="date" class="form-control" id="date" name="date" value="{{ today }}" required>
    </div>
    <div class="mb-3">
        <label for="opponent" class="form-label">対戦相手</label>
        <input type="text" class="form-control" id="opponent" name="opponent" required>
    </div>
    <div class="mb-3">
        <label for="category" class="form-label">区分</label>
        <input type="text" class="form-control" id="category" name="category" placeholder="例: 公式戦, 練習試合">
    </div>
    <div class="mb-3">
        <label for="location" class="form-label">場所</label>
        <input type="text" class="form-control" id="location" name="location">
    </div>
    <div class="mb-3">
        <label for="leverage_item" class="form-label">勝負項目（レバレッジ）</label>
        <select class="form-select" id="leverage_item" name="leverage_item">
            <option value="">なし</option>
            <option value="pts">得点 (PTS)</option>
            <option value="drb">Dリバウンド (DRB)</option>
            <option value="orb">Oリバウンド (ORB)</option>
            <option value="ast">アシスト (AST)</option>
            <option value="stl">スティール (STL)</option>
            <option value="blk">ブロック (BLK)</option>
            <option value="ring_attack">リングアタック</option>
            <option value="ft_drawn_bonus">フリースロー(FT)獲得</option>
            <option value="loose_ball_dive">ルーズボール・ダイブ</option>
            <option value="gamemake_boost">ゲームメイク・ブースト</option>
            <option value="bench_datahack">ベンチ・データハック</option>
            <option value="captain_boost">キャプテン・ブースト</option>
            <option value="charge_drawn">オフェンスチャージ獲得</option>
        </select>
        <div class="form-text">選択した項目の評価ポイントが2倍になります。</div>
    </div>
    <div class="mb-3">
        <label for="memo" class="form-label">メモ</label>
        <textarea class="form-control" id="memo" name="memo" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">作成</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">キャンセル</a>
</form>
{% endblock %}
